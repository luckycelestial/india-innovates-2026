<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRAJA — Citizen Intelligence Platform</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --saffron: #FF6B00;
        --gold:    #f59e0b;
        --green:   #22c55e;
        --navy:    #080f1e;
        --dark:    #0d1526;
        --card:    #111d35;
        --border:  #1e2d4d;
        --text:    #e2e8f0;
        --muted:   #64748b;
        --light:   #94a3b8;
        --white:   #ffffff;
      }
      body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: var(--navy);
        color: var(--text);
        line-height: 1.6;
      }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
